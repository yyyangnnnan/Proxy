no_resolve: true
domain_keyword_set:
- supercell
domain_suffix_set:
- supercell.com
- clashofclans.com
- clashroyale.com
- clashroyaleapp.com
- brawlstars.com
- brawlstarsgame.com
- hayday.com
- haydaygame.com
- boombeach.com
- boombeachgame.com
- mocogame.com
- sc-prod.net
- app-analytics-services.com
- ingest.sentry.io
- recaptcha.net
- usercentrics.eu
- helpshift.com
- and:
      match:
        - protocol:
            match: "UDP"
        - not:
            match:
              - geoip:
                  match: "CN"
        - not:
            match:
              - dest_port:
                  match: "53"
